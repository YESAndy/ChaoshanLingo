# Source: https://learnteochew.com/pages/demonstrative_pronouns.html (content by Brandon Seah)
Skill:
  Name: This and That
  Id: 3

New words:
  - Word: zi2gai5 只個
    Translation: this (one)
    Also accepted:
      - zi2gai5
      - 只個

  - Word: he2gai5 許個
    Translation: that (one)
    Also accepted:
      - he2gai5
      - 許個

  - Word: zi2coh4 只撮
    Translation: these
    Also accepted:
      - zi2coh4
      - 只撮

  - Word: he2coh4 許撮
    Translation: those
    Also accepted:
      - he2coh4
      - 許撮

  - Word: zi2go3 只塊
    Translation: here
    Also accepted:
      - zi2go3
      - 只塊

  - Word: he2go3 許塊
    Translation: there
    Also accepted:
      - he2go3
      - 許塊

  - Word: ziê2sên1 照生
    Translation: in this manner
    Also accepted:
      - ziê2sên1
      - 照生

Mini-dictionary:
  Teochew:
    - Kiêg8: bring, take (挈)
    - he2bung2: that (volume of) (許本)
    - ze1: book (書)
    - guê3lai7: over here (過來)

  English:
    - Bring: Kiêg8
    - that: he2
    - book: ze1
    - here: guê3lai7 (in this phrase)
    - this: zi2
    - one: gai5
    - these: zi2coh4
    - those: he2coh4
    - there: he2go3
    - in: (part of phrase)
    - manner: sên1

Phrases:
  - Phrase: Kiêg8 he2bung2 ze1 guê3lai7.
    Translation: Bring that book here.
    Also accepted:
      - 挈許本書過來。
