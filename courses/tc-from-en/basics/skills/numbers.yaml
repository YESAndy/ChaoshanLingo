Mini-dictionary:
  Teochew:
    - Zi2zung5: now (只陣)
    - gui2: how many (幾)
    - diam2: o'clock, hour (點)
    - san1: three (三)
    - buan3: half (半)

  English:
    - What: gui2 (in this phrase)
    - time: diam2
    - is: si6
    - it: (implied)
    - half-past: buan3
    - three: san1

Phrases:
  - Phrase: Zi2zung5 gui2 diam2?
    Translation: What time is it?
    Also accepted:
      - 只陣幾點？

  - Phrase: san1 diam2 buan3
    Translation: half-past three
    Also accepted:
      - 三點半
