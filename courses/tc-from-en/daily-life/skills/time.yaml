Mini-dictionary:
  Teochew:
    - mêng5ki2: morning (眠起)
    - mên5hng1: evening (暝昏)
    - cig4diam2: seven o'clock (七點)

  English:
    - seven: cig4
    - a.m.: mêng5ki2 cig4diam2
    - p.m.: mên5hng1 cig4diam2
    - morning: mêng5ki2
    - noon: rig8dao3
    - afternoon: ê6gua3
    - dusk: mên5hng1
    - evening: mên5hng1
    - midnight: buan3mên5
    - today: ging1rig8
    - yesterday: za2rig8
    - tomorrow: muan3rig8
    - year: ni5
    - month: ghuêh8
    - week: loi6bai3

