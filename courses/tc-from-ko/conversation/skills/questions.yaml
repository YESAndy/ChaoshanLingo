# 출처: https://learnteochew.com/pages/questions.html (Brandon Seah)
Skill:
  Name: Question Words
  Id: 5

New words:
  - Word: di7diang1 哋㐱
    Translation: 누구 (谁)
    Also accepted:
      - di7diang1
      - 哋㐱

  - Word: mih4gai5 乜個
    Translation: 무엇 (什么)
    Also accepted:
      - 뭐
      - mih4gai5
      - 乜個

  - Word: di7zêg8gai5 哋一個
    Translation: 어느 것 (哪一个)
    Also accepted:
      - 어느거
      - di7zêg8gai5
      - 哋一個

  - Word: di7go3 哋塊
    Translation: 어디 (哪里)
    Also accepted:
      - di7go3
      - 哋塊

  - Word: diang1si5 珍時
    Translation: 언제 (什么时候)
    Also accepted:
      - diang1si5
      - 珍時

  - Word: zo3ni5 做呢
    Translation: 어떻게, 왜 (怎么/为什么)
    Also accepted:
      - 어떻게
      - 왜
      - zo3ni5
      - 做呢

  - Word: gui2 幾
    Translation: 몇 (几)
    Also accepted:
      - gui2
      - 幾

  - Word: riêh8zoi7 若濟
    Translation: 얼마나 (多少)
    Also accepted:
      - 얼마
      - riêh8zoi7
      - 若濟

Mini-dictionary:
  Teochew:
    - Lao1gung1cu3: 병원 (老君厝)
    - do6: ~에 있다 (在)
    - di7go3: 어디 (哋塊)
    - Le2: 너 (汝)
    - ziah8ba2: 배불리 먹다 (食飽)
    - lou7: 완료 조사 (𡀔)
    - bhuê7: 아직 (~하지 않았니) (未)

  Korean:
    - 怎么/为什么: zo3ni5 做呢
    - 谁: 중국어(보통화) 표현
    - 什么: 중국어(보통화) 표현
    - 哪一个: 중국어(보통화) 표현
    - 哪里: 중국어(보통화) 표현
    - 什么时候: 중국어(보통화) 표현
    - 怎么为什么: 중국어(보통화) 표현
    - 怎么: 중국어(보통화) 표현
    - 为什么: 중국어(보통화) 표현
    - 几: 중국어(보통화) 표현
    - 多少: 중국어(보통화) 표현
    - 医院在哪里: 중국어(보통화) 표현
    - 你吃饱了没有: 중국어(보통화) 표현
    - 병원이: Lao1gung1cu3
    - 어디예요: di7go3
    - 밥: ziah8
    - 먹었어요: ziah8ba2 lou7 bhuê7
    - 누구: di7diang1
    - 무엇: mih4gai5
    - 어느: di7
    - 것: gai5
    - 어디: di7go3
    - 언제: diang1si5
    - 어떻게: zo3ni5
    - 왜: zo3ni5
    - 몇: gui2
    - 얼마나: riêh8zoi7

Phrases:
  - Phrase: Lao1gung1cu3 do6 di7go3?
    Translation: 병원이 어디예요? (医院在哪里？)
    Also accepted:
      - 老君厝在哋塊？

  - Phrase: Le2 ziah8ba2 lou7 bhuê7?
    Translation: 밥 먹었어요? (你吃饱了没有？)
    Also accepted:
      - 식사하셨어요?
      - 汝食飽𡀔未？
