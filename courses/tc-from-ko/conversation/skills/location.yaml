  - Word: lai5 來
    Translation: 오다
    Also accepted:
      - lai5
      - 來

  - Word: zi2go3 只塊
    Translation: 여기
    Also accepted:
      - zi2go3
      - 只塊

  - Word: ghua7kao2 外口
    Translation: 밖
    Also accepted:
