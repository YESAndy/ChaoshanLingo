    - 感谢: 중국어(보통화) 표현
    - 不客气: 중국어(보통화) 표현
    - 不好意思: 중국어(보통화) 표현
    - 对不起: 중국어(보통화) 표현
    - 请问先生贵姓: 중국어(보통화) 표현
    - 실례지만: cia2mung7
