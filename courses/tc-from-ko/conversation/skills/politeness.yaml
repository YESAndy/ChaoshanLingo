# 출처: https://learnteochew.com/pages/politeness.html (Brandon Seah)
Skill:
  Name: Being Polite
  Id: 4

New words:
  - Word: cia2mung7 請問
    Translation: 말씀 좀 묻겠습니다 (请问)
    Also accepted:
      - 실례지만
      - cia2mung7
      - 請問

  - Word: sia7sia7 謝謝
    Translation: 감사합니다 (谢谢)
    Also accepted:
      - 고맙습니다
      - sia7sia7
      - 謝謝

  - Word: zoi7sia7 濟謝
    Translation: 대단히 감사합니다 (多谢)
    Also accepted:
      - zoi7sia7
      - 濟謝

  - Word: gam2sia7 感謝
    Translation: 진심으로 감사합니다 (感谢)
    Also accepted:
      - gam2sia7
      - 感謝

  - Word: miang2kêh4ki3 免客氣
    Translation: 천만에요 (不客气)
    Also accepted:
      - 별말씀을요
      - miang2kêh4ki3
      - 免客氣

  - Word: mo2i3se3 孬意思
    Translation: 실례합니다 (不好意思)
    Also accepted:
      - 미안합니다
      - mo2i3se3
      - 孬意思

  - Word: dui3m6zu6 對唔住
    Translation: 죄송합니다 (对不起)
    Also accepted:
      - dui3m6zu6
      - 對唔住

Mini-dictionary:
  Teochew:
    - Cia2mung7: 말씀 좀 묻겠습니다 (請問)
    - sing1sên1: 선생님 (先生)
    - gui3sên3: 성함 (존칭) (貴姓)

  Korean:
    - 请问: 중국어(보통화) 표현
