# 출처: https://learnteochew.com/pages/numbers.html "Telling time" / "Dates" (Brandon Seah)
Skill:
  Name: Time and Days
  Id: 6

New words:
  - Word: mêng5ki2 眠起
    Translation: 아침 (早上)
    Also accepted:
      - 오전
      - mêng5ki2
      - 眠起

  - Word: rig8dao3 日晝
    Translation: 정오 (中午)
