    - 너희: ning2
    - 그들: i1nang7

Phrases:
  - Phrase: I1 si6 uang2 gai5 pêng5iu2.
    Translation: 그는 우리의 친구예요. (他是我们的朋友。)
    Also accepted:
      - 伊是阮個朋友。
