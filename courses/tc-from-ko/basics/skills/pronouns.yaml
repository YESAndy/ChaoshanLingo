    - 他她: 중국어(보통화) 표현
    - 他: 중국어(보통화) 표현
    - 她: 중국어(보통화) 표현
    - 咱们: 중국어(보통화) 표현
    - 我们: 중국어(보통화) 표현
    - 你们: 중국어(보통화) 표현
    - 他们: 중국어(보통화) 표현
    - 他是我们的朋友: 중국어(보통화) 표현
    - 그는: I1 si6
    - 우리의: uang2 gai5
    - 친구예요: pêng5iu2
    - 나: ua2
    - 너: le2
    - 그: i1
