# 출처: https://learnteochew.com/pages/demonstrative_pronouns.html (Brandon Seah)
Skill:
  Name: This and That
  Id: 3

New words:
  - Word: zi2gai5 只個
    Translation: 이것 (这个)
    Also accepted:
      - 이거
      - zi2gai5
      - 只個

  - Word: he2gai5 許個
    Translation: 저것 (那个)
    Also accepted:
      - 저거
      - 그것
      - he2gai5
      - 許個

  - Word: zi2coh4 只撮
    Translation: 이것들 (这些)
    Also accepted:
      - zi2coh4
      - 只撮

  - Word: he2coh4 許撮
    Translation: 저것들 (那些)
    Also accepted:
      - 그것들
      - he2coh4
      - 許撮

  - Word: zi2go3 只塊
    Translation: 여기 (这里)
    Also accepted:
      - zi2go3
      - 只塊

  - Word: he2go3 許塊
    Translation: 저기 (那里)
    Also accepted:
      - 거기
      - he2go3
      - 許塊

  - Word: ziê2sên1 照生
    Translation: 이렇게 (这样)
    Also accepted:
      - 이런 식으로
      - ziê2sên1
      - 照生

Mini-dictionary:
  Teochew:
    - Kiêg8: 가져오다 (挈)
    - he2bung2: 저 (책 한 권) (許本)
    - ze1: 책 (書)
    - guê3lai7: 이리로 (過來)

  Korean:
    - 这个: 중국어(보통화) 표현
    - 那个: 중국어(보통화) 표현
    - 这些: 중국어(보통화) 표현
    - 那些: 중국어(보통화) 표현
    - 这里: 중국어(보통화) 표현
    - 那里: 중국어(보통화) 표현
    - 这样: 중국어(보통화) 표현
    - 把那本书拿过来: 중국어(보통화) 표현
    - 저: he2
    - 책을: ze1
    - 이리: guê3lai7
    - 가져오세요: Kiêg8
    - 이것: zi2gai5
    - 저것: he2gai5
    - 이것들: zi2coh4
    - 저것들: he2coh4
    - 여기: zi2go3
    - 저기: he2go3
    - 이렇게: ziê2sên1

Phrases:
  - Phrase: Kiêg8 he2bung2 ze1 guê3lai7.
    Translation: 저 책을 이리 가져오세요. (把那本书拿过来。)
    Also accepted:
      - 挈許本書過來。
