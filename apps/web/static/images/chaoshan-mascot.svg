  <!-- body -->
  <ellipse cx="120" cy="150" rx="78" ry="64" fill="#c1734a"/>
  <ellipse cx="120" cy="150" rx="78" ry="64" fill="none" stroke="#a85f38" stroke-width="5"/>

  <!-- belly highlight -->
