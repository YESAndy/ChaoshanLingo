<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240" role="img" aria-label="Chaoshan teapot mascot">
  <!-- steam -->
  <g fill="none" stroke="#bfe8ff" stroke-width="7" stroke-linecap="round" opacity="0.9">
    <path d="M96 46 q-8 -12 2 -22 q9 -9 2 -19"/>
    <path d="M126 42 q-8 -12 2 -22 q9 -9 2 -19"/>
  </g>

  <!-- handle -->
  <path d="M186 118 q34 4 26 32 q-7 24 -34 22" fill="none" stroke="#a85f38" stroke-width="14" stroke-linecap="round"/>

