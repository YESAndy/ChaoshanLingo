  <ellipse cx="120" cy="86" rx="46" ry="14" fill="#c1734a" stroke="#a85f38" stroke-width="4"/>
  <circle cx="120" cy="72" r="11" fill="#8a4b2c" stroke="#7a3f24" stroke-width="3"/>

  <!-- face -->
  <circle cx="98" cy="146" r="7.5" fill="#4b2e1e"/>
  <circle cx="142" cy="146" r="7.5" fill="#4b2e1e"/>
  <circle cx="100.5" cy="143.5" r="2.5" fill="#fff"/>
  <circle cx="144.5" cy="143.5" r="2.5" fill="#fff"/>
  <path d="M110 164 q10 10 20 0" fill="none" stroke="#4b2e1e" stroke-width="5" stroke-linecap="round"/>
  <ellipse cx="84" cy="160" rx="9" ry="6" fill="#e8927c" opacity="0.75"/>
  <ellipse cx="156" cy="160" rx="9" ry="6" fill="#e8927c" opacity="0.75"/>

  <!-- teacup friend -->
  <g>
    <ellipse cx="204" cy="206" rx="22" ry="7" fill="#d8d8d8" opacity="0.5"/>
    <path d="M186 186 h36 q2 0 2 3 q-2 18 -20 18 q-18 0 -20 -18 q0 -3 2 -3z" fill="#fff" stroke="#cfcfcf" stroke-width="3"/>
